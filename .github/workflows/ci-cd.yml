name: CI / CD – Build, Test, Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

env:
  SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_PROJECT_REF:       ${{ secrets.SUPABASE_PROJECT_REF }}
  EXA_API_KEY:                ${{ secrets.EXA_API_KEY }}
  HUNTER_API_KEY:             ${{ secrets.HUNTER_API_KEY }}
  GMAIL_API_KEY:              ${{ secrets.GMAIL_API_KEY }}
  HUBSPOT_API_KEY:            ${{ secrets.HUBSPOT_API_KEY }}
  VERCEL_TOKEN:               ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID:              ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID:          ${{ secrets.VERCEL_PROJECT_ID }}
  SUPABASE_FUNCTIONS_TOKEN:   ${{ secrets.SUPABASE_FUNCTIONS_TOKEN }}

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Add pnpm to PATH
        run: echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH

      - name: Install dependencies
        run: pnpm install --frozen-lockfile


      - name: Lint code
        run: pnpm run lint

      - name: Build Next.js app
        run: pnpm run build

      - name: Install Supabase CLI (dev dependency)
        run: pnpm add -D supabase

      - name: Apply database migrations
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF:       ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          pnpm exec supabase link --project-ref $SUPABASE_PROJECT_REF
          pnpm exec supabase db push

      - name: Deploy Next.js app to Vercel
        if: success()
        run: |
          npm install -g vercel
          vercel --prod --token $VERCEL_TOKEN --org-id $VERCEL_ORG_ID --project-id $VERCEL_PROJECT_ID

      - name: Deploy Edge Functions
        if: success()
        run: |
          ./node_modules/.bin/supabase functions deploy $SUPABASE_PROJECT_REF
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit & push any new changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          if ! git diff --quiet; then
            git add .
            git commit -m "Automated commit via CI/CD pipeline [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success message
        if: success()
        run: echo "✅ Build, lint, test, DB migration, Vercel and Edge‑function deployment succeeded."