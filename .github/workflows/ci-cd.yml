# .github/workflows/ci-cd.yml
name: CI / CD – Build, Test, Deploy

# --------------------------------------------------------------
# 1️⃣ Trigger on pushes to the `main` branch (or any branch you like)
# --------------------------------------------------------------
on:
  push:
    branches: [main]

# --------------------------------------------------------------
# 2️⃣ Permissions – needed for Vercel/Netlify & for writing to the repo
# --------------------------------------------------------------
permissions:
  contents: write          # needed for git push at the end
  id-token: write          # needed for Vercel OIDC token exchange

# --------------------------------------------------------------
# 3️⃣ Define the secrets that will be used (add them in Settings > Secrets)
# --------------------------------------------------------------
env:
  # ── Supabase ───────────────────────────────────────
  SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_PROJECT_REF:       ${{ secrets.SUPABASE_PROJECT_REF }}   # <-- your Supabase project ref (UUID)

  # ── Externals ───────────────────────────────────────
  EXA_API_KEY:                ${{ secrets.EXA_API_KEY }}
  HUNTER_API_KEY:             ${{ secrets.HUNTER_API_KEY }}
  GMAIL_API_KEY:              ${{ secrets.GMAIL_API_KEY }}
  HUBSPOT_API_KEY:            ${{ secrets.HUBSPOT_API_KEY }}

  # ── Vercel (or Netlify) for Next.js deployment ────────
  VERCEL_TOKEN:               ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID:              ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID:          ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Supabase Edge‑function deployment ─────────────────
  SUPABASE_FUNCTIONS_TOKEN:   ${{ secrets.SUPABASE_FUNCTIONS_TOKEN }}

# --------------------------------------------------------------
# 4️⃣ Jobs
# --------------------------------------------------------------
jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------
      # 1️⃣ Checkout repository (full history – needed for later git push)
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                 # get full history for later git diff / push

      # ---------------------------------------------------------
      # 2️⃣ Set up Node (use the same version you develop with)
      # ---------------------------------------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'            # <-- match your dev environment
          cache: 'npm'

      # ---------------------------------------------------------
      # 3️⃣ Install deps & run lint & build
      # ---------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build Next.js app
        run: npm run build

      # ---------------------------------------------------------
      # 3️⃣ Install and run Supabase CLI (for db push & function deploy)
      # ---------------------------------------------------------
      - name: Install Supabase CLI
        run: npm install -g supabase-cli

      - name: Apply database migrations
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF:       ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase db push --project-ref $SUPABASE_PROJECT_REF

      - name: Deploy Next.js app to Vercel (or Netlify)
        if: success()
        run: |
          # Install Vercel CLI
          npm install -g vercel
          # Deploy – the token, org‑id and project‑id are taken from secrets
          vercel --prod \
            --token $VERCEL_TOKEN \
            --org-id $VERCEL_ORG_ID \
            --project-id $VERCEL_PROJECT_ID

      # ---------------------------------------------------------
      # 5️⃣ OPTIONAL – Deploy Edge Functions to Supabase
      # ---------------------------------------------------------
      - name: Deploy Edge Functions
        if: success()
        run: |
          # The supabase functions CLI needs the project ref again
          supabase functions deploy $SUPABASE_PROJECT_REF
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ---------------------------------------------------------
      # 4️⃣ Commit & push any new migration files or updated scripts
      # ---------------------------------------------------------
      - name: Commit & push any new changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Only commit if there are *new* changes
          if ! git diff --quiet; then
            git add .
            git commit -m "Automated commit via CI/CD pipeline [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # 5️⃣ Success notification
      # ---------------------------------------------------------
      - name: Success message
        if: success()
        run: echo "✅ Build, lint, test, DB migration, Vercel and Edge‑function deployment succeeded."