name: CI / CD – Build, Test, Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Node / pnpm ──────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Lint ─────────────────────────────────────────────────────────────────
      - name: Lint code
        run: pnpm run lint

      # ─── Build ────────────────────────────────────────────────────────────────
      - name: Build Next.js app
        run: pnpm next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"

      # ─── Supabase CLI ─────────────────────────────────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ─── Database Migrations ──────────────────────────────────────────────────
      # We use --linked mode after linking via project-ref + password.
      # The SUPABASE_ACCESS_TOKEN env var is automatically picked up by the CLI
      # for authentication against the Management API.
      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Error: SUPABASE_DB_PASSWORD secret is empty. Please set it in GitHub Secrets."
            exit 1
          fi
          
          echo "Linking project..."
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          
          echo "Pushing migrations..."
          supabase db push --linked

      # ─── Vercel Deploy ────────────────────────────────────────────────────────
      # Uses the official Vercel action – no pnpm add needed, no lockfile mutation.
      - name: Deploy to Vercel (Production)
        run: |
          pnpm dlx vercel@latest --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ─── Edge Functions ───────────────────────────────────────────────────────
      # IMPORTANT: supabase functions deploy only accepts ONE function name at a
      # time. Passing multiple names is not supported and causes silent failures.
      # --use-api skips Docker (not available in GitHub-hosted runners).
      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          REF="${{ secrets.SUPABASE_PROJECT_REF }}"

          # --- Orchestration pipeline (JWT verification disabled) ---
          supabase functions deploy validate-email \
            --project-ref "$REF" --no-verify-jwt --use-api

          supabase functions deploy research-company \
            --project-ref "$REF" --no-verify-jwt --use-api

          supabase functions deploy score-lead \
            --project-ref "$REF" --no-verify-jwt --use-api

          supabase functions deploy trigger-lead-qualifier \
            --project-ref "$REF" --no-verify-jwt --use-api

          # --- Supporting functions (standard JWT verification) ---
          supabase functions deploy parallel-research \
            --project-ref "$REF" --use-api

          supabase functions deploy pipeline-monitor \
            --project-ref "$REF" --use-api

          supabase functions deploy process-bulk-prospects \
            --project-ref "$REF" --use-api

          supabase functions deploy upload-collateral \
            --project-ref "$REF" --use-api

          supabase functions deploy validate-linkedin \
            --project-ref "$REF" --use-api

      # ─── Auto-commit (lockfile / generated files) ─────────────────────────────
      - name: Commit any generated changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          if ! git diff --quiet; then
            git add .
            git commit -m "chore: automated commit via CI/CD [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Success
        run: echo "Build · Lint · Migrations · Vercel · Edge Functions — all succeeded."