name: CI / CD – Build, Test, Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

env:
  SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_PROJECT_REF:       ${{ secrets.SUPABASE_PROJECT_REF }}
  EXA_API_KEY:                ${{ secrets.EXA_API_KEY }}
  HUNTER_API_KEY:             ${{ secrets.HUNTER_API_KEY }}
  GMAIL_API_KEY:              ${{ secrets.GMAIL_API_KEY }}
  HUBSPOT_API_KEY:            ${{ secrets.HUBSPOT_API_KEY }}
  VERCEL_TOKEN:               ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID:              ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID:          ${{ secrets.VERCEL_PROJECT_ID }}
  SUPABASE_FUNCTIONS_TOKEN:   ${{ secrets.SUPABASE_FUNCTIONS_TOKEN }}

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Add pnpm to PATH
        run: echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH

      - name: Install dependencies
        run: pnpm install --frozen-lockfile


      - name: Lint code
        run: pnpm run lint

      - name: Build Next.js app
        run: pnpm run build

      - name: Install Supabase CLI (version pinned)
        run: |
          SUPABASE_VERSION="1.127.1"
          mkdir -p $HOME/.local/bin
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          # Map x86_64 to amd64 (Supabase uses amd64 naming)
          if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"; fi
          DOWNLOAD_URL="https://github.com/supabase/cli/releases/download/v$SUPABASE_VERSION/supabase_${OS}_${ARCH}.tar.gz"
          curl -sL $DOWNLOAD_URL -o supabase.tar.gz
          gzip -t supabase.tar.gz || { echo "Invalid gzip format" >&2; exit 1; }
          tar -xzf supabase.tar.gz -C $HOME/.local/bin
          rm supabase.tar.gz
          chmod +x $HOME/.local/bin/supabase
          echo "$HOME/.local/bin" >> $GITHUB_PATH


      - name: Apply database migrations
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF:       ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Error: SUPABASE_PROJECT_REF is not set"
            exit 1
          fi
          supabase link --project-ref $SUPABASE_PROJECT_REF
          supabase db push

      - name: Install Vercel CLI
        run: |
          pnpm add -D vercel

      - name: Deploy Next.js app to Vercel
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_LOG_LEVEL: debug
        run: |
          npx vercel --prod --token $VERCEL_TOKEN --org-id $VERCEL_ORG_ID --project-id $VERCEL_PROJECT_ID

      - name: Deploy Edge Functions
        if: success()
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          supabase functions deploy $SUPABASE_PROJECT_REF
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}


      - name: Commit & push any new changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          if ! git diff --quiet; then
            git add .
            git commit -m "Automated commit via CI/CD pipeline [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success message
        if: success()
        run: echo "✅ Build, lint, test, DB migration, Vercel and Edge‑function deployment succeeded."